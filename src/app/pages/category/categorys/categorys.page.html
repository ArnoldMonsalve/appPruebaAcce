<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToTasks()">
        Tareas
        <ion-icon name="arrow-forward" slot="end"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Nueva Categoría</ion-label>
    <ion-input [(ngModel)]="newCategory" placeholder="Digite una categoria"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="addCategory()" class="ion-margin-top">
    <ion-icon name="add" slot="start"></ion-icon>
    Agregar Categoría
  </ion-button>

  <ion-list>
    <ion-list-header>
      <ion-label>Categorías Registradas</ion-label>
    </ion-list-header>

    <ion-item *ngFor="let cat of categories">
      <ion-label>{{ cat.name }}</ion-label>
      <ion-buttons slot="end">
        <ion-button color="primary" (click)="openEditModal(cat)">
          <ion-icon name="pencil" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button *ngIf="showDelete" color="danger" (click)="openConfirmModal(cat)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>

  <ion-modal [isOpen]="isEditModalOpen" (didDismiss)="isEditModalOpen = false">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Editar Categoría</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="isEditModalOpen = false">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-label position="stacked">Nombre</ion-label>
          <ion-input [(ngModel)]="editName"></ion-input>
        </ion-item>
        <ion-button expand="block" (click)="saveEdit()" class="ion-margin-top">
          Guardar Cambios
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>

<ion-modal
  [isOpen]="isConfirmModalOpen"
  (didDismiss)="closeConfirmModal()"
  handleBehavior="cycle"
  style="--height: fit-content; --border-radius: 16px; --align-items: center;"
>
  <ng-template>
    <div class="ion-padding ion-text-center" style="background: white; border-radius: 16px;">

      <div class="ion-margin-bottom">
        <ion-icon name="alert-circle" color="danger" style="font-size: 80px;"></ion-icon>
      </div>

      <h2 style="font-weight: bold; color: black; margin-bottom: 10px;">¿Eliminar Categoría?</h2>

      <p style="color: #444; margin-bottom: 20px;">
        ¿Estás seguro de eliminar <b>{{ categoryToDelete?.name }}</b>?
        <br><small>Esta acción no se puede deshacer.</small>
      </p>

      <ion-button expand="block" color="danger" shape="round" (click)="confirmDelete()" style="margin-bottom: 10px;">
        SÍ, ELIMINAR
      </ion-button>

      <ion-button expand="block" fill="clear" color="medium" (click)="closeConfirmModal()">
        No, cancelar
      </ion-button>
    </div>
  </ng-template>
</ion-modal>

</ion-content>
